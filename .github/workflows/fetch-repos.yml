name: Fetch Revanced Repos

on:
  schedule:
      - cron: "20 2,6,10,14,18,22 * * *" # Every 4 hours
  workflow_dispatch:
  push:

concurrency:
  group: Revanced-repo-fetcher
  cancel-in-progress: false

permissions:
  contents: write

env:
  OUTPUT_FILE: repos.txt

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Repos (registry-based)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_FILE: ${{ env.OUTPUT_FILE }}
        run: |
          python scripts/fetch_org_repos.py

      - name: Discover More Repos (GitHub-wide search)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_FILE: ${{ env.OUTPUT_FILE }}
        run: |
          python scripts/discover_github_wide.py

      - name: Generate README
        env:
          OUTPUT_FILE: ${{ env.OUTPUT_FILE }}
        run: |
          python scripts/generate_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): update Revanced repo list [skip ci]"
            git push origin main
          else
            echo "No changes detected. Skipping commit."
          fi